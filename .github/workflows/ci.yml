name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint + lightweight unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lightweight dependencies
        # The full pipeline needs torch / opencv / streamlit / yt-dlp, which
        # are heavy for CI. We only install what the unit-test suite actually
        # needs so CI stays fast and reliable. The end-to-end smoke test is
        # optional and is skipped when torch isn't available.
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn pytest
          pip install opencv-python-headless || true

      - name: Run unit tests (no heavy deps)
        run: |
          pytest tests/test_utils.py \
                 tests/test_reference.py \
                 tests/test_segments.py \
                 tests/test_benchmark.py \
                 tests/test_report.py \
                 -q

      - name: Verify imports of source modules
        run: |
          python -c "import importlib; \
            [importlib.import_module(m) for m in ( \
              'src.reference', 'src.reporting', 'src.benchmark', \
              'src.utils', 'src.models.reference_scorer', \
              'src.models.hybrid_scorer')]"
